        function changeLanguage(lang) {
            if (!translations[lang]) lang = 'en';

            const flagMap = { en: '🇬🇧', ro: '🇷🇴', hu: '🇭🇺', it: '🇮🇹', de: '🇩🇪', fr: '🇫🇷' };
            const codeMap = { en: 'EN', ro: 'RO', hu: 'HU', it: 'IT', de: 'DE', fr: 'FR' };

            document.getElementById('current-flag').textContent = flagMap[lang];
            document.getElementById('current-lang').textContent = codeMap[lang];

            Object.keys(translations[lang]).forEach(key => {
                const el = document.getElementById(key);
                if (el) {
                    if (el.tagName === "INPUT" || el.tagName === "TEXTAREA") {
                        el.placeholder = translations[lang][key];
                    } else {
                        el.innerHTML = translations[lang][key];
                    }
                }
            });

            document.getElementById('page-title').textContent = translations[lang]["page-title"];
            document.documentElement.lang = lang;
        }

        let dropdownOpen = false;
        function toggleDropdown() {
            const dd = document.getElementById('lang-dropdown');
            const ch = document.getElementById('chevron');
            dropdownOpen = !dropdownOpen;
            dd.classList.toggle('hidden', !dropdownOpen);
            ch.style.transform = dropdownOpen ? 'rotate(180deg)' : '';
        }

        document.getElementById('lang-btn').addEventListener('click', toggleDropdown);

        document.addEventListener('click', (e) => {
            if (!document.getElementById('lang-btn').contains(e.target)) {
                const dd = document.getElementById('lang-dropdown');
                if (!dd.classList.contains('hidden')) toggleDropdown();
            }
        });

        window.onload = () => changeLanguage('en');
